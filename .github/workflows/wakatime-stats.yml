name: Update WakaTime Stats - axrobert

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-stats:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create folder
        run: mkdir -p wakatime

      # ================== BARRAS VERTICAIS (grande) ==================
      - name: Generate All Languages Bar Vertical
        env:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -fsSL "https://wakatime-readme-stats.vercel.app/api/wakatimeStats?username=$GITHUB_ACTOR&api_key=$WAKATIME_API_KEY&github_token=$GITHUB_TOKEN&component1_type=all_langs&component1_chart_type=bar_vertical&component1_num_langs=12&theme=dark&bg_color=0d1117&title_color=58a6ff&text_color=8b949e&logo_color=58a6ff&border_color=30363d&border_radius=16" \
            -o wakatime/all_langs_bar.svg

      # 2. Spedometer
      - name: Spedometer
        env:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
        run: |
          curl -fsSL "https://wakatime-readme-stats.vercel.app/api/wakatimeStats?username=$GITHUB_ACTOR&api_key=$WAKATIME_API_KEY&component1_type=spedometer&theme=dark&bg_color=0d1117&title_color=58a6ff&text_color=8b949e&logo_color=58a6ff&border_color=30363d&border_radius=16" \
            -o wakatime/spedometer.svg

      # 3. Weekly Ranking - tamanho padrão (mais natural)
      - name: Weekly Ranking
        env:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
        run: |
          curl -fsSL "https://wakatime-readme-stats.vercel.app/api/wakatimeStats?username=$GITHUB_ACTOR&api_key=$WAKATIME_API_KEY&component1_type=rank&component1_mode=level&component1_show_icons=true&theme=dark&bg_color=0d1117&title_color=58a6ff&text_color=8b949e&logo_color=58a6ff&border_color=30363d&border_radius=16&title_prefix=Weekly%20Ranking" \
            -o wakatime/weekly_ranking.svg

      - name: Cache Buster
        run: |
          V="$(date -u +%Y%m%d%H%M)"
          sed -i -E "s#(wakatime/.*\.svg)\?v=[0-9]+#\1?v=$V#g" README.md
          sed -i -E "s#(wakatime/.*\.svg)(\"|')#\1?v=$V\2#g" README.md

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add wakatime/*.svg README.md
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update Weekly Ranking mais achatado"
          git push
