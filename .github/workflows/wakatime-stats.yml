name: Update WakaTime Stats SVG - axrobert

on:
  schedule:
    - cron: "0 */6 * * *"    # Atualiza a cada 6 horas (mude para "0 * * * *" se quiser a cada 1 hora)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate SVG - All Languages Bar Vertical
        env:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p wakatime
          curl -fsSL "https://wakatime-readme-stats.vercel.app/api/wakatimeStats?username=$GITHUB_ACTOR&api_key=$WAKATIME_API_KEY&github_token=$GITHUB_TOKEN&components=1&theme=dark&bg_color=0d1117&title_color=58a6ff&text_color=8b949e&logo_color=58a6ff&border_color=30363d&border_radius=16&component1_type=all_langs&component1_chart_type=bar_vertical&component1_num_langs=10" \
            -o wakatime/stats.svg

      - name: Bump README cache-buster
        run: |
          set -euo pipefail
          V="$(date -u +%Y%m%d)"
          sed -i -E "s#(wakatime/stats\.svg)\?v=[0-9]+#\1?v=$V#g" README.md
          sed -i -E "s#(wakatime/stats\.svg)(\"|')#\1?v=$V\2#g" README.md

      - name: Commit changes
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add wakatime/stats.svg README.md
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update WakaTime All Languages Bar Vertical (cache-bust v=$(date -u +%Y%m%d))"
          git push
